<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SepsisSense | Result</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
.result-page{padding:140px 7% 70px;background:linear-gradient(180deg,#fff,#f7f8ff);min-height:100vh}
.result-card{max-width:900px;margin:auto;background:#fff;border-radius:26px;padding:45px;box-shadow:0 18px 45px rgba(15,23,42,.08)}
.status{text-align:center}
.badge{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:999px;font-weight:700;font-size:20px}
.low{background:#E8F8EC;color:#14803c}
.high{background:#FDECEC;color:#C62828}
.title{font-size:44px;color:#0F172A;margin:20px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:25px;margin-top:30px}
.box{background:#F8FAFC;border-radius:18px;padding:24px;transition:.3s}
.box:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,.08)}
.box h3{margin-bottom:10px;color:#7C3AED}
.big{font-size:40px;font-weight:800;color:#0F172A}
.progress{height:14px;background:#E5E7EB;border-radius:20px;overflow:hidden;margin-top:15px}
.fill{height:100%;background:linear-gradient(90deg,#7C3AED,#EC4899);width:{{ probability }}%;transition:width 1.2s ease}
.actions{text-align:center;margin-top:40px}
.btn{display:inline-block;margin:8px;padding:16px 30px;border-radius:14px;text-decoration:none;color:#fff;font-weight:700;transition:.3s}
.primary{background:linear-gradient(135deg,#7C3AED,#EC4899)}
.secondary{background:#0F4C81}
.btn:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 15px 30px rgba(124,58,237,.25)}
@media(max-width:768px){.grid{grid-template-columns:1fr}.title{font-size:34px}}
</style>
</head>
<body>

<nav>
<div class="logo"><i class="fa-solid fa-heart-pulse"></i><span>SepsisSense</span></div>
<ul>
<li><a href="/">Home</a></li>
<li><a href="/predict">Prediction</a></li>
<li><a href="#">About</a></li>
</ul>
</nav>

<section class="result-page">
<div class="result-card">

<div class="status">
<div class="badge {{ 'high' if 'High' in risk else 'low' }}">{{ risk }}</div>
<h1 class="title"><i class="fa-solid fa-robot"></i> AI Analysis Complete</h1>
</div>

<div class="grid">
<div class="box">
<h3>Diagnosis</h3>
<p class="big">{{ prediction }}</p>
</div>

<div class="box">
<h3>AI Confidence</h3>
<p class="big">{{ probability }}%</p>
<div class="progress">
<div class="fill"></div>
</div>
</div>

<div class="box" style="grid-column:1/-1">
<h3>Clinical Recommendation</h3>
<p>{{ recommendation }}</p>
</div>
</div>

<div class="actions">
<a href="/predict" class="btn primary"><i class="fa-solid fa-stethoscope"></i> Predict Another Patient</a>
<a href="/" class="btn secondary"><i class="fa-solid fa-house"></i> Home</a>
</div>

</div>
</section>

</body>
</html>
