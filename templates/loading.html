<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SepsisSense | AI Analysis</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body{font-family:Inter,sans-serif;background:linear-gradient(135deg,#f8f7ff,#fff);display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{width:min(700px,92%);background:#fff;border-radius:24px;padding:40px;box-shadow:0 20px 50px rgba(15,23,42,.1);text-align:center}
.spinner{width:80px;height:80px;border:8px solid #ece8ff;border-top-color:#7C3AED;border-radius:50%;margin:0 auto 25px;animation:spin 1s linear infinite}
h1{color:#0F172A;margin-bottom:10px}
p{color:#64748B;margin-bottom:30px}
.step{display:flex;justify-content:space-between;padding:14px 18px;margin:10px 0;background:#F8FAFC;border-radius:12px;font-weight:600}
.check{color:#16A34A}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
<div class="spinner"></div>
<h1><i class="fa-solid fa-robot"></i> AI is Analyzing Patient Data</h1>
<p>Please wait while SepsisSense processes the clinical information.</p>

<div class="step"><span>Scaling Clinical Features</span><span class="check">✓</span></div>
<div class="step"><span>Running Logistic Regression</span><span class="check">✓</span></div>
<div class="step"><span>Calculating Sepsis Probability</span><span class="check">✓</span></div>
<div class="step"><span>Preparing Clinical Recommendation</span><span class="check">✓</span></div>

</div>

</body>
</html>
